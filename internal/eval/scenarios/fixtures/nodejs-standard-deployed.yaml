# Imported stage-vega-style Node.js recipe project. The services already
# exist and have live buildFromGit deployments, but no ZCP ServiceMeta yet.
# Scenarios using this fixture should adopt first, then enter develop with
# an explicit runtime scope.

services:
  - hostname: appdev
    type: nodejs@22
    zeropsSetup: dev
    buildFromGit: https://github.com/zerops-recipe-apps/nodejs-hello-world-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  - hostname: appstage
    type: nodejs@22
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/nodejs-hello-world-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  - hostname: db
    type: postgresql@18
    mode: NON_HA
    priority: 10
    verticalAutoscaling:
      minRam: 0.25
