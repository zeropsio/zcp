#yamlPreprocessor=on

# Used by develop-* scenarios that need a live Laravel app to iterate on.
# buildFromGit clones + builds + deploys `zeropsio/recipe-laravel-minimal`,
# whose zerops.yml declares `setup: app` — the import hostname MUST match
# that setup name or Zerops fails the build at 0s. Seed intentionally
# writes no ServiceMeta: the develop-* scenarios test that the LLM can
# adopt existing unmanaged services (bootstrap/adopt route) and then
# continue into the develop flow.

services:
  - hostname: app
    type: php-nginx@8.4
    buildFromGit: https://github.com/zeropsio/recipe-laravel-minimal
    enableSubdomainAccess: true
    envSecrets:
      APP_KEY: <@generateRandomString(<32>)>
      APP_DEBUG: true
      APP_ENV: development
    verticalAutoscaling:
      minRam: 0.5

  - hostname: db
    type: postgresql@18
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25
