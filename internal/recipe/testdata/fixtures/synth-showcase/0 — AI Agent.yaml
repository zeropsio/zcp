#zeropsPreprocessor=on

# AI agent workspace — a dev slot per codebase for SSH iteration
# plus a stage slot that validates the production build path.
project:
  name: synth-showcase-agent
  envVariables:
    APP_SECRET: <@generateRandomString(<32>)>
    DEV_API_URL: ${api_zeropsSubdomainHost}

services:
  # API dev — SSHFS-mounted source, hot reload.
  - hostname: apidev
    type: nodejs@22
    priority: 5
    zeropsSetup: dev
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-api
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 1

  # API stage — prod build validation.
  - hostname: apistage
    type: nodejs@22
    priority: 5
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-api
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  - hostname: appdev
    type: nodejs@22
    zeropsSetup: dev
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 1

  - hostname: appstage
    type: nodejs@22
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  - hostname: workerdev
    type: nodejs@22
    zeropsSetup: dev
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-worker
    verticalAutoscaling:
      minRam: 1

  - hostname: workerstage
    type: nodejs@22
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/synth-showcase-worker
    verticalAutoscaling:
      minRam: 0.5

  # Postgres for the greetings table.
  - hostname: db
    type: postgresql@18
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25

  - hostname: cache
    type: valkey@7
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25

  - hostname: broker
    type: nats@2
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25

  - hostname: storage
    type: object-storage
    objectStorageSize: 1
    objectStoragePolicy: private

