# AI agent environment provides a development space for AI agents to build and
# version the app.
# It includes a dev service with the code repository and necessary development
# tools, a staging service, and a low-resource database.

# No project-level secrets needed — NestJS minimal uses no encryption keys or
# CSRF tokens. Database credentials are auto-generated by the managed PostgreSQL
# service and wired via cross-service references in zerops.yaml.
project:
  name: nestjs-minimal-agent

services:
  # AI agent workspace — zeropsSetup:dev deploys the full source tree so the
  # agent can SSH in, edit TypeScript over SSHFS, and run `npm run start:dev`
  # for hot-reload. Subdomain provides a public URL for the agent to verify
  # dashboard output and health endpoints.
  - hostname: appdev
    type: nodejs@22
    zeropsSetup: dev
    buildFromGit: https://github.com/zerops-recipe-apps/nestjs-minimal-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  # Staging slot for the agent — cross-deploy with zeropsSetup:prod compiles
  # TypeScript via `npm run build`, prunes devDependencies, and runs the
  # compiled JS with `node dist/main.js` to validate the production build before
  # finishing the task.
  - hostname: appstage
    type: nodejs@22
    zeropsSetup: prod
    buildFromGit: https://github.com/zerops-recipe-apps/nestjs-minimal-app
    enableSubdomainAccess: true
    verticalAutoscaling:
      minRam: 0.5

  # PostgreSQL — stores the greetings table used by the dashboard CRUD demo.
  # TypeORM synchronize handles schema in dev; the migrate.ts script handles it
  # in prod. NON_HA is appropriate for a dev/staging database. Priority 10
  # ensures db accepts connections before app containers attempt migrations.
  - hostname: db
    type: postgresql@18
    priority: 10
    mode: NON_HA
    verticalAutoscaling:
      minRam: 0.25

