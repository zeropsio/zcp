version: "2"
run:
  concurrency: 16
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - depguard
    - dogsled
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - gocheckcompilerdirectives
    - gochecksumtype
    - goconst
    - gocritic
    - godox
    - goheader
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - importas
    - ineffassign
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - reassign
    - revive
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    depguard:
      # Pins the 4-layer architecture documented in CLAUDE.md and
      # docs/spec-architecture.md. Each rule scopes a layer's outgoing
      # imports to what the layer is allowed to depend on.
      rules:
        topology-stdlib-only:
          # Layer 2 — foundational vocabulary. Stdlib + 3rd-party only,
          # never internal/ packages (would create a cycle the moment
          # any other layer imported topology/, which they all do).
          list-mode: lax
          files:
            - "**/internal/topology/**/*.go"
          deny:
            - pkg: github.com/zeropsio/zcp/internal
              desc: "topology/ is layer-2 vocabulary; imports stdlib + 3rd-party only"
        platform-no-internal:
          # Layer 1 — raw Zerops API. Stdlib + 3rd-party only.
          list-mode: lax
          files:
            - "**/internal/platform/**/*.go"
          deny:
            - pkg: github.com/zeropsio/zcp/internal
              desc: "platform/ is layer 1; no internal/ imports allowed"
        ops-not-workflow:
          # Layer 3 peer — must NOT import its peer (workflow/) nor any
          # upper-layer package (tools/, recipe/).
          list-mode: lax
          files:
            - "**/internal/ops/*.go"
          deny:
            - pkg: github.com/zeropsio/zcp/internal/workflow
              desc: "ops/ and workflow/ are peer layer-3 packages; share types via topology/"
            - pkg: github.com/zeropsio/zcp/internal/tools
              desc: "ops/ is layer 3; tools/ is layer 4 entry"
            - pkg: github.com/zeropsio/zcp/internal/recipe
              desc: "ops/ is layer 3; recipe/ is a cross-cutting v3 engine"
        ops-checks-legacy:
          # Sub-package ops/checks/ holds recipe v2 check producers that
          # must keep importing workflow/ for the StepCheck types until
          # recipe v2 is deleted. The exemption is workflow-only —
          # importing tools/ or recipe/ from a check would still be a
          # layering violation, so we deny those explicitly here.
          list-mode: lax
          files:
            - "**/internal/ops/checks/*.go"
          deny:
            - pkg: github.com/zeropsio/zcp/internal/tools
              desc: "ops/checks/ is layer 3 (recipe v2 legacy); tools/ is layer 4 entry"
            - pkg: github.com/zeropsio/zcp/internal/recipe
              desc: "ops/checks/ is layer 3 (recipe v2 legacy); recipe/ is a cross-cutting v3 engine"
        workflow-not-ops:
          # Layer 3 peer — must NOT import its peer (ops/) nor any
          # upper-layer package (tools/, recipe/).
          list-mode: lax
          files:
            - "**/internal/workflow/**/*.go"
          deny:
            - pkg: github.com/zeropsio/zcp/internal/ops
              desc: "workflow/ and ops/ are peer layer-3 packages; share types via topology/"
            - pkg: github.com/zeropsio/zcp/internal/tools
              desc: "workflow/ is layer 3; tools/ is layer 4 entry"
            - pkg: github.com/zeropsio/zcp/internal/recipe
              desc: "workflow/ is layer 3; recipe/ is a cross-cutting v3 engine"
    goconst:
      min-len: 3
      min-occurrences: 3
    godox:
      keywords:
        - FIXME
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errorlint
          - forcetypeassert
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
        text: 'G306:'
      - linters:
          - gosec
        path: testutil/
        text: 'G306:'
      - linters:
          - goconst
        path: _test\.go
      - linters:
          - gosec
        text: 'G101:'
      - linters:
          - gosec
        text: 'G115:'
      - linters:
          - revive
        path: internal/platform/client\.go
        text: 'var-naming: struct field'
      - linters:
          - revive
        text: 'exported: type name will be used as'
      # The analyze package emits a spec-defined JSON schema with
      # snake_case keys (see docs/zcprecipator2/spec-recipe-analysis-harness.md §2).
      # Keys like B-15_ghost_env_dirs are analyst citation anchors and
      # must match the spec byte-for-byte — camelCase would break the
      # verdict-to-evidence binding the harness is built to enforce.
      - linters:
          - tagliatelle
        path: internal/analyze/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
