api_url: https://api.zerops.io/api/recipes

slug_remap:
  recipe: nodejs-hello-world

environments:
  dev_stage: "AI Agent"
  small_prod: "Small Production"

exclude_categories:
  - service-utility

push:
  recipes:
    org: zerops-recipe-apps
    repo_patterns:
      - "{slug}-app"
      - "{slug}"
    branch_prefix: zcp
    commit_prefix: "chore(knowledge)"
  guides:
    repo: zeropsio/docs
    path: apps/docs/content/guides
    branch_prefix: zcp
    commit_prefix: "chore(guides)"

paths:
  output: internal/knowledge
